name: mes-connector

on:
  workflow_dispatch:
  pull_request:
    paths: ['src/Mes.Connector/**', 'src/Platform/**', 'schemas/**']
  push:
    branches: [main]
    paths: ['src/Mes.Connector/**', 'src/Platform/**', 'schemas/**']

jobs:
  ci:
    uses: ./.github/workflows/_dotnet-service.yml
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      service-path: src/Mes.Connector
      service-name: mes-connector
      coverage-threshold: 80
