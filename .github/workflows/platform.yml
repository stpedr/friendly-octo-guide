name: platform

# Platform é biblioteca cross-cutting (sem imagem/serviço): build + testes com
# cobertura, sem o job de imagem do template de serviço.
on:
  workflow_dispatch:
  pull_request:
    paths: ['src/Platform/**']
  push:
    branches: [main]
    paths: ['src/Platform/**']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0.x' }
      - name: Build (warnings = erros, via Directory.Build.props)
        run: dotnet build src/Platform/Platform.Tests --configuration Release
      - name: Testes com cobertura mínima (só o código testável de plataforma)
        # A barra mede o que TEM teste de unidade (Security: masking, pgcrypto;
        # Audit: redação e diff de permissão). O glue de host
        # (PlatformDefaults/Instrumentation/Secrets) é exercido pelos serviços, não aqui.
        run: |
          dotnet test src/Platform/Platform.Tests --configuration Release --no-build \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=cobertura \
            /p:Threshold=80 \
            /p:ThresholdType=line \
            /p:ThresholdStat=total \
            /p:Include='[Platform.ServiceDefaults]Platform.ServiceDefaults.Security.*,[Platform.Audit]*'
