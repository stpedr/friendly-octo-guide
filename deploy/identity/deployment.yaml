apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity
  namespace: acesso
spec:
  replicas: 2
  selector:
    matchLabels: { app: identity }
  template:
    metadata:
      labels: { app: identity }
    spec:
      containers:
        - name: identity
          image: harbor.interno/plataforma/identity:latest
          ports: [{ containerPort: 8080 }]
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observabilidade:4317
            # Jwt__SigningKey e seeds TOTP: OpenBao via External Secrets Operator.
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: identity
  namespace: acesso
spec:
  selector: { app: identity }
  ports: [{ port: 8080, targetPort: 8080 }]
