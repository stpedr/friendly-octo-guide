name: obs-client

on:
  workflow_dispatch:
  pull_request:
    paths: ['clients/observability/web/**']
  push:
    branches: [main]
    paths: ['clients/observability/web/**']

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Fase 0: o gate é sintaxe válida + manifest íntegro + TOTP correto.
      - name: Sintaxe dos módulos
        run: |
          node --check clients/observability/web/app.js
          node --check clients/observability/web/totp.js
          node --check clients/observability/web/sw.js
      - name: Manifest é JSON válido
        run: node -e "JSON.parse(require('fs').readFileSync('clients/observability/web/manifest.webmanifest','utf8'))"
      - name: TOTP bate com os vetores da RFC 6238
        run: |
          cd clients/observability/web && node -e "
          global.window = global; require('./totp.js');
          (async () => {
            const s = 'GEZDGNBVGY3TQOJQGEZDGNBVGY3TQOJQ';
            if (!(await window.TOTP.verify(s, '287082', 59000))) { console.error('vetor RFC falhou'); process.exit(1); }
            if (await window.TOTP.verify(s, '000000', 59000)) { console.error('aceitou código errado'); process.exit(1); }
            console.log('TOTP OK');
          })();
          "
