apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-execution
  namespace: nucleo
spec:
  replicas: 2
  selector:
    matchLabels: { app: core-execution }
  template:
    metadata:
      labels: { app: core-execution }
    spec:
      containers:
        - name: core-execution
          image: harbor.interno/plataforma/core-execution:latest
          ports: [{ containerPort: 8080 }]
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observabilidade:4317
            - name: Kafka__Bootstrap
              value: kafka.transporte:9092
            # ConnectionStrings__Postgres: OpenBao via External Secrets.
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: core-execution
  namespace: nucleo
spec:
  selector: { app: core-execution }
  ports: [{ port: 8080, targetPort: 8080 }]
