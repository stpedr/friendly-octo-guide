name: chatbot

on:
  pull_request:
    paths: ['src/Chatbot/**', 'src/Platform/**', 'schemas/**']
  push:
    branches: [main]
    paths: ['src/Chatbot/**', 'src/Platform/**', 'schemas/**']

jobs:
  ci:
    uses: ./.github/workflows/_dotnet-service.yml
    with:
      service-path: src/Chatbot
      service-name: chatbot
      coverage-threshold: 80
