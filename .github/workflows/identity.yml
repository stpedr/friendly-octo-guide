name: identity

on:
  pull_request:
    paths: ['src/Identity/**', 'src/Platform/**', 'schemas/**']
  push:
    branches: [main]
    paths: ['src/Identity/**', 'src/Platform/**', 'schemas/**']

jobs:
  ci:
    uses: ./.github/workflows/_dotnet-service.yml
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      service-path: src/Identity
      service-name: identity
      coverage-threshold: 80
