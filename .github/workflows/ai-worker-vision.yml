name: ai-worker-vision

on:
  workflow_dispatch:
  pull_request:
    paths: ['src/Ai/**', 'src/Platform/**']
  push:
    branches: [main]
    paths: ['src/Ai/**', 'src/Platform/**']

jobs:
  ci:
    uses: ./.github/workflows/_dotnet-service.yml
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      service-path: src/Ai
      service-name: ai-worker-vision
      dockerfile: src/Ai/Dockerfile.worker-vision
      coverage-threshold: 80
