name: agents

on:
  workflow_dispatch:
  pull_request:
    paths: ['src/Agents/**', 'src/Platform/**']
  push:
    branches: [main]
    paths: ['src/Agents/**', 'src/Platform/**']

jobs:
  ci:
    uses: ./.github/workflows/_dotnet-service.yml
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      service-path: src/Agents
      service-name: agents
      coverage-threshold: 80
