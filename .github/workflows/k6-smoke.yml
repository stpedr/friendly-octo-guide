name: k6-smoke

# Smoke de carga contra um ambiente JÁ NO AR (Pi, Jetson, cluster) — por isso é
# workflow_dispatch com a URL, não gatilho de push: o runner precisa alcançar o alvo.
on:
  workflow_dispatch:
    inputs:
      base-url:
        description: URL base do Gateway (ex. http://plataforma.example.com:8180)
        required: true
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Imagem oficial do k6 em vez de action de marketplace: imune à política
      # de actions do repo (mesma razão do _dotnet-service.yml).
      - name: Rodar smoke k6
        run: |
          docker run --rm -v "$PWD:/work" -w /work \
            -e BASE_URL='${{ inputs.base-url }}' \
            grafana/k6:0.57.0 run tests/k6/smoke.js
