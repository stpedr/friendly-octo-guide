name: integration

# Testes de integração REAIS: sobem Postgres+pgvector e Redis de verdade como
# serviços do runner e rodam os serviços .NET contra eles (não fakes). No repo
# padrão os testes se auto-pulam sem as env vars; aqui elas são definidas.
on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/Knowledge/**'
      - 'src/Gateway/**'
      - 'src/Platform/**'
  push:
    branches: [main]
    paths:
      - 'src/Knowledge/**'
      - 'src/Gateway/**'
      - 'src/Platform/**'

jobs:
  live:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: knowledge
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 5s --health-retries 10
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      KNOWLEDGE_PG: "Host=localhost;Username=postgres;Password=dev;Database=knowledge"
      GATEWAY_VALKEY: "localhost:6379"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0.x' }
      - name: Habilitar a extensão vector no Postgres
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          PGPASSWORD=dev psql -h localhost -U postgres -d knowledge -c 'CREATE EXTENSION IF NOT EXISTS vector;'
      - name: Integração — Knowledge contra pgvector real
        run: dotnet test src/Knowledge/Knowledge.IntegrationTests --configuration Release
      - name: Integração — Gateway (rate limit Redis + multi-tenant) real
        run: dotnet test src/Gateway/Gateway.IntegrationTests --configuration Release
