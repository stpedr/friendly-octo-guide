# Workflow reutilizável para todo serviço .NET do monorepo.
# Ordem: gate TDD → build → testes + cobertura → imagem assinada.
# Cada serviço o instancia com um arquivo fino (ver telemetry-ingest.yml).

name: _dotnet-service

on:
  workflow_call:
    inputs:
      service-path:            # ex: src/Telemetry.Ingest
        required: true
        type: string
      service-name:            # ex: telemetry-ingest (nome da imagem)
        required: true
        type: string
      coverage-threshold:
        required: false
        type: number
        default: 80
      dockerfile:              # default: <service-path>/Dockerfile; blocos com 2 binários passam o seu
        required: false
        type: string
        default: ''

jobs:
  # ── Gate 00: TDD ──────────────────────────────────────────────
  # Reprova PR que muda código de produção sem tocar em teste.
  # Não prova que o teste veio ANTES, mas torna impossível "depois eu testo".
  tdd-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Exigir teste junto com código de produção
        run: |
          BASE="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}" --depth=1
          PROD_CHANGED=$(git diff --name-only "$BASE"...HEAD -- \
            '${{ inputs.service-path }}/**' \
            ':!${{ inputs.service-path }}/*Tests*/**' | grep -c '\.cs$' || true)
          TEST_CHANGED=$(git diff --name-only "$BASE"...HEAD -- \
            '${{ inputs.service-path }}/*Tests*/**' | grep -c '\.cs$' || true)
          echo "produção: $PROD_CHANGED arquivo(s) · testes: $TEST_CHANGED arquivo(s)"
          if [ "$PROD_CHANGED" -gt 0 ] && [ "$TEST_CHANGED" -eq 0 ]; then
            echo "::error::PR altera código de produção sem alterar testes. TDD é gate, não sugestão."
            exit 1
          fi

  # ── Build + testes + cobertura ────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: [tdd-gate]
    if: always() && (needs.tdd-gate.result == 'success' || needs.tdd-gate.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0.x' }
      - name: Restore + build (warnings = erros, via Directory.Build.props)
        run: dotnet build ${{ inputs.service-path }} --configuration Release
      - name: Testes com cobertura mínima
        run: |
          dotnet test ${{ inputs.service-path }} --configuration Release --no-build \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=cobertura \
            /p:Threshold=${{ inputs.coverage-threshold }} \
            /p:ThresholdType=line \
            /p:ThresholdStat=total
      - name: Publicar relatório de cobertura no PR
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ inputs.service-name }}
          path: '**/coverage.cobertura.xml'

  # ── Imagem: build, scan, assinatura ───────────────────────────
  image:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    permissions: { contents: read, packages: write, id-token: write }
    steps:
      - uses: actions/checkout@v4
      - name: Build da imagem
        # contexto = raiz do repo: o Dockerfile copia Directory.Build.props e src/ de lá
        run: docker build -f ${{ inputs.dockerfile != '' && inputs.dockerfile || format('{0}/Dockerfile', inputs.service-path) }} -t ${{ inputs.service-name }}:${{ github.sha }} .
      - name: Scan de vulnerabilidades (Trivy) — CRITICAL bloqueia
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.service-name }}:${{ github.sha }}
          exit-code: '1'
          severity: 'CRITICAL'

      # ── Supply chain: só imagem escaneada, publicada e ASSINADA sai daqui ──
      # Registry: GHCR (grátis no repo). Migrar pra Harbor+Trivy é trocar o login e o prefixo.
      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push da imagem
        id: push
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/plataforma/${{ inputs.service-name }}"
          IMAGE="${IMAGE,,}"   # GHCR exige minúsculas
          docker tag ${{ inputs.service-name }}:${{ github.sha }} "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:${{ github.sha }}"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE:${{ github.sha }}")
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
      - name: Instalar cosign
        uses: sigstore/cosign-installer@v3
      - name: Assinatura keyless (OIDC do próprio job — sem chave pra vazar)
        run: cosign sign --yes "${{ steps.push.outputs.digest }}"
