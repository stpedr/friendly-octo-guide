name: knowledge

on:
  workflow_dispatch: # re-run manual (ex.: exercitar o job de imagem na main)
  pull_request:
    paths: ['src/Knowledge/**', 'src/Platform/**']
  push:
    branches: [main]
    paths: ['src/Knowledge/**', 'src/Platform/**']

jobs:
  ci:
    uses: ./.github/workflows/_dotnet-service.yml
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      service-path: src/Knowledge
      service-name: knowledge
      coverage-threshold: 80
