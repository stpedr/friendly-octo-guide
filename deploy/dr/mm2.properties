# MirrorMaker 2: replica os tópicos da plataforma pra um Kafka standby
# (outra máquina/site). Roda no lado STANDBY, puxando do primário:
#
#   connect-mirror-maker.sh deploy/dr/mm2.properties
#
# (o binário vem no tarball do Kafka; na prática: docker run apache/kafka:3.9.0
#  /opt/kafka/bin/connect-mirror-maker.sh /config/mm2.properties com este
#  arquivo montado)

clusters = primario, standby
primario.bootstrap.servers = PRIMARIO_HOST:9092
standby.bootstrap.servers = localhost:9092

# Só o sentido primário → standby (ativo-passivo; failback é operação manual).
primario->standby.enabled = true
standby->primario.enabled = false

# O que replica: eventos de negócio, alertas, auditoria e telemetria.
# Internos (offsets, configs) ficam de fora — o MM2 traduz offsets sozinho.
primario->standby.topics = core\.eventos\..*, linha\..*, ai\..*, auditoria\..*
primario->standby.topics.exclude = .*\.internal, __.*

# Fator 1 no homelab (um broker por lado); suba junto com o cluster real.
replication.factor = 1
checkpoints.topic.replication.factor = 1
heartbeats.topic.replication.factor = 1
offset-syncs.topic.replication.factor = 1

# Checkpoints frequentes = failover com menos releitura pelos consumers.
emit.checkpoints.interval.seconds = 10
sync.group.offsets.enabled = true
