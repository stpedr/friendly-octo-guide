# Dev local + PoC (fase 0). Kubernetes só entra na fase 1.
# Sobe: transporte (Kafka), stores (Postgres/Valkey/MinIO/VictoriaMetrics),
# borda (Mosquitto) e a espinha de observabilidade completa (OTel → Loki/Tempo/VM → Grafana).
services:
  kafka:
    image: apache/kafka:3.9.0          # KRaft, sem ZooKeeper
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # pgvector/pgvector = imagem oficial do Postgres + extensão vector (Knowledge usa).
  # WAL archiving ligado: junto com o pg-backup (perfil ha) dá PITR — ver docs/governanca.
  postgres:
    image: pgvector/pgvector:pg17
    entrypoint: ["/bin/bash", "/postgres-entrypoint.sh"]
    ports: ["5432:5432"]
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - archive_mode=on
      - -c
      - archive_command=test ! -f /wal-archive/%f && cp %p /wal-archive/%f
    environment:
      POSTGRES_DB: linha
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    volumes:
      - pgdata:/var/lib/postgresql/data
      - wal-archive:/wal-archive
      - ./deploy/infra/postgres-entrypoint.sh:/postgres-entrypoint.sh:ro
      - ./deploy/infra/postgres-init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
      - ./deploy/infra/postgres-init-replication.sh:/docker-entrypoint-initdb.d/20-replication-hba.sh:ro

  # Réplica de leitura por streaming (perfil ha): relatório/analytics saem do primário.
  postgres-replica:
    image: pgvector/pgvector:pg17
    entrypoint: ["/bin/bash", "/replica-entrypoint.sh"]
    ports: ["5433:5432"]
    environment:
      PRIMARY_HOST: postgres
      PGPASSWORD: replicator-dev
      # Exigido pela imagem, mas ignorado após o basebackup clonar o primário.
      POSTGRES_PASSWORD: unused
    volumes:
      - pgreplica:/var/lib/postgresql/data
      - ./deploy/infra/postgres-replica-entrypoint.sh:/replica-entrypoint.sh:ro
    depends_on: [postgres]
    profiles: [ha]

  # Dump lógico diário com retenção — a metade "base" do PITR.
  pg-backup:
    image: pgvector/pgvector:pg17
    entrypoint: ["/bin/bash", "/pg-backup.sh"]
    environment:
      PGHOST: postgres
      PGUSER: dev
      PGPASSWORD: dev
    volumes:
      - pgbackups:/backups
      - ./deploy/infra/pg-backup.sh:/pg-backup.sh:ro
    depends_on: [postgres]
    profiles: [ha]

  # Cache de sessão, resultados quentes e rate limiting distribuído.
  # Valkey (Linux Foundation): protocolo Redis, licença aberta.
  valkey:
    image: valkey/valkey:8
    ports: ["6379:6379"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: msuchoa
      MINIO_ROOT_PASSWORD: w1ntersun
    volumes: [miniodata:/data]

  # Contrato de evento com dono: os .avsc de schemas/ são registrados aqui e
  # versionados pelo registry (compatibilidade BACKWARD por padrão no grupo).
  schema-registry:
    image: apicurio/apicurio-registry:3.0.13
    ports: ["8085:8080"]

  # One-shot: publica os schemas do repo no registry a cada `up` (idempotente).
  schema-init:
    image: curlimages/curl:8.17.0
    entrypoint: ["/bin/sh", "/init/register-schemas.sh"]
    volumes:
      - ./schemas:/schemas:ro
      - ./deploy/infra/register-schemas.sh:/init/register-schemas.sh:ro
    depends_on: [schema-registry]
    restart: "no"

  # ── Stream processing (perfil stream): janelas/joins sobre os tópicos ──
  # Queries versionadas em deploy/stream/queries.sql (tempestade de alertas,
  # throughput por linha). SQL contínuo, estado no próprio Kafka.
  ksqldb:
    image: confluentinc/ksqldb-server:0.29.0
    ports: ["8088:8088"]
    environment:
      KSQL_BOOTSTRAP_SERVERS: kafka:29092
      KSQL_LISTENERS: http://0.0.0.0:8088
      KSQL_KSQL_SERVICE_ID: plataforma-linha
    depends_on: [kafka]
    profiles: [stream]

  # ── Borda com WAF (perfil waf): NGINX + ModSecurity + OWASP CRS na frente do Gateway ──
  ingress-waf:
    image: owasp/modsecurity-crs:nginx-alpine
    ports: ["8443:8080"]
    environment:
      BACKEND: ${WAF_BACKEND:-http://host.docker.internal:5180}   # gateway em dev; no cluster, o Service dele
      MODSEC_RULE_ENGINE: "On"                     # bloqueia, não só detecta
      BLOCKING_PARANOIA: "1"                       # CRS nível 1: baixo falso-positivo
    extra_hosts: ["host.docker.internal:host-gateway"]
    profiles: [waf]

  # ── Plataforma de engenharia (perfil plataforma-eng) ─────────────
  # Feature flags self-hosted, Git-native e sem plano Enterprise/trial.
  flipt:
    image: docker.flipt.io/flipt/flipt:v2
    ports: ["4242:8080", "4243:9000"]
    volumes:
      - fliptdata:/var/opt/flipt
    profiles: [plataforma-eng]

  # Registro de modelos/experimentos do subsistema preditivo.
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.4.0
    command:
      - mlflow
      - server
      - --host=0.0.0.0
      - --backend-store-uri=sqlite:///mlflow/mlflow.db
      - --artifacts-destination=/mlflow/artifacts
    ports: ["5500:5000"]
    volumes: [mlflowdata:/mlflow]
    profiles: [plataforma-eng]

  # Status page + checagem sintética de fora pra dentro.
  uptime-kuma:
    image: louislam/uptime-kuma:1
    ports: ["3001:3001"]
    volumes: [kumadata:/app/data]
    profiles: [plataforma-eng]

  # Linhagem OpenLineage: consome os eventos do Data.Archiver (e futuros produtores)
  # e mostra o grafo de proveniência do dado. API + web.
  marquez:
    image: marquezproject/marquez:0.49.0
    command: ["./entrypoint.sh"]
    ports: ["5001:5000", "5011:5001"]
    environment:
      MARQUEZ_CONFIG: /usr/src/app/marquez.dev.yml
      POSTGRES_HOST: postgres
      POSTGRES_DB: marquez
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    depends_on: [postgres]
    profiles: [plataforma-eng]
  marquez-web:
    image: marquezproject/marquez-web:0.49.0
    ports: ["3012:3000"]
    environment:
      MARQUEZ_HOST: marquez
      MARQUEZ_PORT: "5000"
    depends_on: [marquez]
    profiles: [plataforma-eng]

  # FinOps: custo de GPU/storage/Kafka vira métrica no MESMO Grafana.
  # Aponta pro VictoriaMetrics (Prometheus-compatível) — um TSDB a menos.
  opencost:
    image: ghcr.io/opencost/opencost:1.113.0
    ports: ["9003:9003"]
    environment:
      PROMETHEUS_SERVER_ENDPOINT: http://victoriametrics:8428
      CLOUD_PROVIDER_API_KEY: ""    # on-prem: custo por recurso vem de tabela local, não de cloud
    depends_on: [victoriametrics]
    profiles: [plataforma-eng]

  # SLO + error budget: cada serviço declara SLO (deploy/observability/slo/),
  # o budget queimando aparece no Grafana e congela deploy arriscado.
  pyrra:
    image: ghcr.io/pyrra-dev/pyrra:v0.8.4
    user: "0:0"
    command: ["filesystem", "--prometheus-url=http://victoriametrics:8428"]
    ports: ["9099:9444"]
    volumes:
      - ./deploy/observability/slo:/etc/pyrra:ro
      - pyrra-rules:/etc/prometheus/pyrra
    depends_on: [victoriametrics]
    profiles: [plataforma-eng]

  # Portal de docs da plataforma (Docusaurus) — fonte única de docs versionada.
  docs-portal:
    image: node:22-alpine
    working_dir: /site
    command: ["sh", "-c", "npm install --no-package-lock && npm run start -- --host 0.0.0.0"]
    ports: ["3003:3000"]
    environment:
      DOCUSAURUS_DOCS_PATH: /docs-content
    volumes:
      - ./docs/portal:/site
      - ./docs/arquitetura.md:/docs-content/arquitetura.md:ro
      - ./docs/mapa-implementacao.md:/docs-content/mapa-implementacao.md:ro
      - ./docs/governanca:/docs-content/governanca:ro
      - docs-portal-node-modules:/site/node_modules
      - docs-portal-cache:/site/.docusaurus
    profiles: [plataforma-eng]

  # Broker MQTT da borda (na fábrica real, roda na DMZ industrial — nível 3.5 do Purdue).
  mosquitto:
    image: eclipse-mosquitto:2
    ports: ["1883:1883"]
    volumes:
      - ./deploy/observability/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  # ── Espinha de observabilidade ──────────────────────────────────
  # Todo serviço exporta OTLP pra cá; o collector roteia logs → Loki,
  # traces → Tempo, métricas → VictoriaMetrics. Nada sai desse funil.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.130.0
    command: ["--config=/etc/otel/config.yaml"]
    ports: ["4317:4317", "4318:4318"]
    volumes:
      - ./deploy/observability/otel-collector.yaml:/etc/otel/config.yaml:ro
    depends_on: [loki, tempo, victoriametrics]

  loki:
    image: grafana/loki:3.3.2
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports: ["3100:3100"]

  tempo:
    image: grafana/tempo:2.7.0
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports: ["3200:3200"]
    volumes:
      - ./deploy/observability/tempo.yaml:/etc/tempo/tempo.yaml:ro

  # TSDB da linha E das métricas Prometheus — um banco a menos pra operar.
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.109.1
    command: ["--storageDataPath=/storage", "--httpListenAddr=:8428"]
    ports: ["8428:8428"]
    volumes: [vmdata:/storage]

  grafana:
    image: grafana/grafana-oss:11.5.1
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: msuchoa
      GF_SECURITY_ADMIN_PASSWORD: w1ntersun
      GF_AUTH_ANONYMOUS_ENABLED: "true"    # dev apenas; prod usa OIDC do Keycloak
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./deploy/observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    depends_on: [loki, tempo, victoriametrics]

  # Push OSS self-hosted — alertas chegam no celular sem serviço pago.
  ntfy:
    image: binwiederhier/ntfy:v2.11.0
    command: ["serve"]
    ports: ["8090:80"]

volumes:
  pgdata:
  pgreplica:
  pgbackups:
  wal-archive:
  miniodata:
  vmdata:
  mlflowdata:
  kumadata:
  fliptdata:
  docs-portal-node-modules:
  docs-portal-cache:
  pyrra-rules:
