# chrony nos nós de borda (edge/gateway) — a referência de tempo que o
# quality gate e a correlação de eventos assumem. Ver
# docs/governanca/sincronizacao-tempo-ot.md.
#
# Relógio dessincronizado na borda é onde mais dá problema silencioso em OT:
# o drift do quality gate, o z-score do Predictive e a duração de parada do OEE
# todos dependem de timestamps confiáveis.

# Fontes a montante: pool público como fallback + um servidor interno confiável
# (o próprio gateway/Pi como stratum local pra rede OT isolada, que não alcança
# a internet — troque pelo IP do seu servidor de tempo interno).
pool pool.ntp.org iburst maxsources 4
# server ntp.interno.local iburst prefer

# Deriva gravada em disco pra convergir rápido após reboot.
driftfile /var/lib/chrony/chrony.drift

# Corrige o relógio de uma vez nas 3 primeiras atualizações se o erro for grande
# (> 1s) — um dispositivo que acabou de subir não deve produzir telemetria com
# relógio torto.
makestep 1.0 3

# Sincroniza o RTC de hardware (evita drift entre reboots em nós sem bateria boa).
rtcsync

# Este nó serve tempo pra rede OT isolada (níveis 0–2 do Purdue não alcançam a
# internet): vira o stratum local dos PLCs/sensores. Restrinja à sub-rede OT.
# allow 10.20.0.0/16

# Log de rastreamento — o offset e o stratum viram métrica no painel (o drift
# real do nó é observável, não suposto).
logdir /var/log/chrony
log tracking measurements statistics
