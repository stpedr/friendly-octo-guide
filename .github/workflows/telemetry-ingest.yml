name: telemetry-ingest

on:
  workflow_dispatch: # re-run manual (ex.: exercitar o job de imagem na main)
  pull_request:
    paths: ['src/Telemetry.Ingest/**', 'src/Platform/**', 'schemas/**']
  push:
    branches: [main]
    paths: ['src/Telemetry.Ingest/**', 'src/Platform/**', 'schemas/**']

jobs:
  ci:
    uses: ./.github/workflows/_dotnet-service.yml
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      service-path: src/Telemetry.Ingest
      service-name: telemetry-ingest
      coverage-threshold: 80
