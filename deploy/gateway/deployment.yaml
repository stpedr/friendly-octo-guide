apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: acesso
spec:
  replicas: 2
  selector:
    matchLabels: { app: gateway }
  template:
    metadata:
      labels: { app: gateway }
    spec:
      containers:
        - name: gateway
          image: harbor.interno/plataforma/gateway:latest # CI troca pela tag do commit
          ports: [{ containerPort: 8080 }]
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observabilidade:4317
            # Jwt__SigningKey vem do OpenBao via External Secrets — nunca aqui.
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: acesso
spec:
  selector: { app: gateway }
  ports: [{ port: 8080, targetPort: 8080 }]
---
# Borda web escala por tráfego (CPU como proxy de RPS na fase 1).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway
  namespace: acesso
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
